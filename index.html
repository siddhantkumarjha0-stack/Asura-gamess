<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASURA.GAMES | Haptic Mode</title>
    <style>
        :root { --neon-red: #ff3131; --gold: #ffd700; }
        body { background-color: #050505; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; transition: 0.3s; overflow-x: hidden; }
        
        /* Boss Pulse Effect */
        @keyframes bossPulse { 0% { background-color: #050505; } 50% { background-color: #300; } 100% { background-color: #050505; } }
        .boss-active { animation: bossPulse 1s infinite; }

        h1 { font-size: 3rem; color: var(--neon-red); text-shadow: 0 0 20px var(--neon-red); margin: 10px 0; }
        #power-up-status { height: 25px; color: #ffeb3b; font-weight: bold; font-size: 1.2rem; }

        .game-container {
            background: rgba(17, 17, 17, 0.9);
            border: 3px solid var(--neon-red);
            border-radius: 20px;
            padding: 20px;
            width: 320px;
            margin: 10px auto;
            min-height: 450px;
        }

        #score-board { font-size: 4.5rem; margin: 0; font-weight: 900; }
        .target { font-size: 100px; cursor: pointer; user-select: none; display: inline-block; margin: 20px 0; transition: transform 0.05s; }
        
        .btn-start { background: var(--neon-red); color: white; border: none; padding: 15px; border-radius: 50px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.1rem; }
        .btn-start:disabled { background: #333; }
        
        .share-section { margin-top: 20px; display: none; }
        .share-btn { display: inline-block; padding: 10px; margin: 5px; border-radius: 5px; color: white; text-decoration: none; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <h1>ASURA.GAMES</h1>
    <div id="power-up-status"></div>

    <div class="game-container">
        <div id="level-tag" style="color:var(--gold)">LEVEL: MORTAL</div>
        <h2 id="score-board">0</h2>
        <div style="color:var(--neon-red)">TIME: <span id="seconds">40</span>s</div>
        
        <div class="target" id="creature" onclick="countClick()">👹</div>
        
        <button class="btn-start" id="start-btn" onclick="startGame()">ENTER THE ARENA</button>

        <div class="share-section" id="share-ui">
            <a href="#" class="share-btn" style="background:#25D366" id="wa-link">WhatsApp Share</a>
        </div>
    </div>

    <script>
        let score = 0, timeLeft = 40, gameActive = false, isRageMode = false;
        let combo = 0, lastClickTime = 0, currentSize = 100, timerInterval, powerUpInterval;

        // VIBRATION HELPER
        function vibrate(ms) {
            if ("vibrate" in navigator) {
                navigator.vibrate(ms);
            }
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d) {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function startGame() {
            audioCtx.resume();
            score = 0; timeLeft = 40; currentSize = 100; gameActive = true;
            document.getElementById('score-board').innerText = "0";
            document.getElementById('start-btn').disabled = true;
            document.getElementById('share-ui').style.display = "none";
            document.body.classList.remove('boss-active');
            
            vibrate(100); // Start buzz

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('seconds').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);

            powerUpInterval = setInterval(() => { if(gameActive) triggerRage(); }, 5000);
        }

        function triggerRage() {
            isRageMode = true;
            document.getElementById('power-up-status').innerText = "🔥 RAGE MODE 🔥";
            vibrate([100, 50, 100]); // Rage heartbeat pattern
            setTimeout(() => { isRageMode = false; document.getElementById('power-up-status').innerText = ""; }, 2000);
        }

        function countClick() {
            if (!gameActive) return;
            const now = Date.now();
            combo = (now - lastClickTime < 800) ? combo + 1 : 1;
            lastClickTime = now;

            let pts = isRageMode ? 4 : (combo >= 20 ? 3 : (combo >= 10 ? 2 : 1));
            score += pts;
            document.getElementById('score-board').innerText = score;

            const c = document.getElementById('creature');
            
            // Boss Evolution + Vibration
            if (score >= 70 && !document.body.classList.contains('boss-active')) { 
                document.body.classList.add('boss-active');
                c.innerText = "🐲🐲🐲"; 
                vibrate(500); // Heavy boss arrival buzz
            }

            if (isRageMode) currentSize += 5; else if (currentSize > 15) currentSize -= 2.7;
            c.style.fontSize = currentSize + "px";
            
            playSfx(200 + (combo * 10), 'square', 0.05);
            vibrate(15); // Tiny hit vibration
            
            c.style.transform = "scale(1.2)";
            setTimeout(() => c.style.transform = "scale(1)", 50);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval); clearInterval(powerUpInterval);
            document.getElementById('start-btn').disabled = false;
            vibrate([200, 100, 200]); // Game over pattern
            
            const waUrl = `https://api.whatsapp.com/send?text=I scored ${score} on ASURA.GAMES! Can you beat a Legend? 🔥`;
            document.getElementById('wa-link').href = waUrl;
            document.getElementById('share-ui').style.display = "block";
            
            alert("BATTLE OVER! SCORE: " + score);
        }
    </script>
</body>
</html>
